name: Release Bot

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for this version"
        required: false
        type: string
        default: ""

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun run build

      - name: Generate version
        id: version
        run: |
          TIMESTAMP=$(date +"%Y-%m-%d-%H-%M")
          echo "version=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "Release version: $TIMESTAMP"

      - name: Create release directory
        run: |
          mkdir -p release
          cp dist/bot release/lichessbot

      - name: Create GitHub Release
        uses: softprops/action-gh-release@26e8ad27a09a225049a7075d7ec1caa2df6ff332 # v2.6.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ${{ github.event.inputs.release_notes }}

            ## Installation

            1. Download the `lichessbot` binary
            2. Make it executable: `chmod +x lichessbot`
            3. Run: `./lichessbot`

            **Built with Bun** | **Linux ARM64**
          files: |
            release/lichessbot
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
